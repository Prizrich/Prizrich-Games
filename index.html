<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prizrich Игровой Хаб — Мини-Игры Онлайн</title>
    <style>
        /* ===================================================================
           СТРОГИЙ МАЙНКРАФТ-СТИЛЬ ГЛАВНОГО ХАБА ИГР (CSS)
           =================================================================== */
        body {
            margin: 0; 
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c1b12; /* Каноничный земляной цвет выживания */
            background-image: 
                linear-gradient(rgba(0,0,0,0.16) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0,0,0,0.16) 2px, transparent 2px);
            background-size: 32px 32px; /* Пиксельная сетка блоков */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Общая оболочка меню */
        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 850px;
            width: 100%;
        }

        /* Серое окно интерфейса (как сундук или инвентарь) */
        .menu-container {
            background-color: #2b2b2b;
            border: 4px solid #141414;
            padding: 45px 40px;
            border-radius: 4px;
            box-shadow: inset -4px -4px 0px #141414, inset 4px 4px 0px #3c3c3c, 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        /* Желтый майнкрафтовский заголовок */
        h1 {
            color: #ffff55; 
            font-size: 2.6rem;
            margin-top: 0;
            margin-bottom: 12px;
            text-shadow: 3px 3px 0px #3f3f00; /* Тень под текст */
            letter-spacing: 2px;
        }

        .subtitle {
            color: #aaaaaa;
            font-size: 1.05rem;
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* Сетка для вертикального ряда кнопок */
        .games-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* ВЫПУКЛЫЕ ИНТЕРАКТИВНЫЕ МАЙНКРАФТ-КНОПКИ */
        .menu-btn {
            background-color: #4a4a4a;
            color: #e0e0e0;
            border: 2px solid #141414;
            padding: 18px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none; /* Убираем синее подчеркивание */
            display: block;
            box-shadow: inset -3px -3px 0px #2c2c2c, inset 3px 3px 0px #616161;
            transition: all 0.1s ease;
            box-sizing: border-box;
            text-align: center;
            cursor: pointer;
        }

        /* Синий фокус при наведении */
        .menu-btn:hover {
            background-color: #5555ff;
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: inset -3px -3px 0px #0000aa, inset 3px 3px 0px #aaaaff;
        }

        /* Вдавленный клик */
        .menu-btn:active {
            transform: translateY(3px);
            box-shadow: inset 3px 3px 0px #0000aa, inset -3px -3px 0px #aaaaff;
        }

        /* ЭКСКЛЮЗИВНАЯ МЕДОВАЯ КНОПКА ДЛЯ ФЕРМЫ */
        .farm-premium-btn {
            background-color: #2d6a4f !important;
            color: #ffff55 !important;
            border-color: #141414 !important;
            box-shadow: inset -3px -3px 0px #1a3a2a, inset 3px 3px 0px #409a6f !important;
        }
        .farm-premium-btn:hover {
            background-color: #409a6f !important;
            color: #ffffff !important;
            border-color: #ffd966 !important;
            box-shadow: inset -3px -3px 0px #2d6a4f, inset 3px 3px 0px #6fc89f !important;
        }

        /* Медовая кнопка для кликера */
        .honey-premium-btn {
            background-color: #5c3a00 !important;
            color: #ffff55 !important;
            border-color: #141414 !important;
            box-shadow: inset -3px -3px 0px #2c1c04, inset 3px 3px 0px #8b5a2b !important;
        }
        .honey-premium-btn:hover {
            background-color: #ffaa00 !important;
            color: #ffffff !important;
            border-color: #ffffff !important;
            box-shadow: inset -3px -3px 0px #b87100, inset 3px 3px 0px #ffea9f !important;
        }

        /* Адаптивность под мобильные телефоны */
        @media (max-width: 550px) {
            h1 { font-size: 2rem; }
            .menu-container { padding: 30px 20px; }
            .menu-btn { font-size: 1.05rem; padding: 14px 18px; }
        }
    </style>
</head>
<body>

                <a href="Pixel Farm/index.html" class="menu-btn farm-premium-btn">🌾 Pixel Farm (Гача Огород)</a>
                
                <a href="Игра Усатый пчел/index.html" class="menu-btn">🐝 Усатый Пчёл (Симулятор Бизнеса)</a>
                <a href="Bee-Clicker/index.html" class="menu-btn honey-premium-btn">👑 Bee-Clicker (Эволюция Улья 500 LVL)</a>
            </div>
        </div>

    </div>

</body>
</html>
