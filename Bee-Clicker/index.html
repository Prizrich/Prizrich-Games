<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Bee Clicker: Твоя Пасека</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="clicker-container">
        <h2>🍯 Твоя пасека</h2>

        <!-- ПАНЕЛЬ СТАТИСТИКИ -->
        <div class="stats-box">
            <div>Всего мёда: <b id="ui-total-honey">0.0К</b> л</div>
            <div>Доход: <b id="ui-income-rate">0.0</b> л/сек</div>
            <div>Сила клика: <b id="ui-click-power">1</b> л</div>
            <div>Уровень Королевы: <b id="ui-queen-lvl">1</b> / 500</div>
        </div>

        <!-- ГОРШОК ДЛЯ КЛИКОВ (АВТО-МАСШТАБ ПОД ЭКРАН ТЕЛЕФОНА) -->
        <div id="pot-clickable" style="font-size: 7.5rem; text-align: center; cursor: pointer; user-select: none; filter: drop-shadow(4px 4px 0px #000); margin: 15px auto; width: fit-content; transition: transform 0.05s ease; animation: menuPulse 2s infinite ease-in-out;">
            🍯
        </div>

        <!-- СПИСОК УЛУЧШЕНИЙ МАГАЗИНА -->
        <h3>🛒 Модернизация</h3>
        <div class="inventory-list">
            <!-- УЛУЧШЕНИЕ 1: ШМЕЛИ -->
            <div class="inventory-item">
                <div style="display:flex; flex-direction:column; text-align:left;">
                    <span id="ui-shmel-counter" style="font-weight:bold;">Шмели-рабочие (x0)</span>
                    <span style="font-size:0.7rem; color:#666;">+1.5 л/сек пассивного дохода</span>
                </div>
                <button class="mini-plant-btn" onclick="window.buyShmelWorker()">🛒 <span id="ui-shmel-price-tag">50</span></button>
            </div>

            <!-- УЛУЧШЕНИЕ 2: КОРОЛЕВА -->
            <div class="inventory-item">
                <div style="display:flex; flex-direction:column; text-align:left;">
                    <span style="font-weight:bold;">👑 Прокачка Матки</span>
                    <span style="font-size:0.7rem; color:#666;">+2 литра к силе клика</span>
                </div>
                <button class="mini-plant-btn" onclick="window.upgradeQueenBee()">🛒 <span id="ui-queen-price-tag">150</span></button>
            </div>
        </div>

        <!-- КНОПКА ПОЛНОГО СБРОСА -->
        <button class="farm-btn reset-progress-btn" style="background-color: #ba2929;" onclick="window.resetEntireGameProgress()">
            💥 Сбросить прогресс
        </button>
    </div>

    <!-- ВСТРОЕННЫЙ ДВИЖОК ИГРЫ (ОДНОФАЙЛОВЫЙ ВАРИАНТ) -->
    <script>
        console.log("🐝 Запуск ядра Bee-Clicker...");

        let saveState = {
            honey: 0,
            clickPower: 1,
            incomePerSecond: 0,
            queenLevel: 1,
            shmelCount: 0,
            shmelPrice: 50,
            queenPrice: 150
        };

        let lastClickTime = 0;

        // КРАСИВОЕ УВЕДОМЛЕНИЕ В СТИЛЕ МАНКРАФТ ВЗАМЕН ALERT()
        window.showGameAlert = function(message, emoji = "⚠️") {
            const oldAlert = document.querySelector(".game-alert-popup");
            if (oldAlert) oldAlert.remove();

            const alertBox = document.createElement("div");
            alertBox.className = "game-alert-popup";
            alertBox.innerHTML = `
                <span style="font-size: 1.4rem; filter: drop-shadow(2px 2px 0px #000);">${emoji}</span>
                <p class="game-alert-text">${message}</p>
            `;
            
            document.body.appendChild(alertBox);
            
            setTimeout(() => { alertBox.classList.add("show"); }, 30);
            
            setTimeout(() => {
                alertBox.classList.remove("show");
                setTimeout(() => { alertBox.remove(); }, 400);
            }, 2500);
        };

        function initBeeClicker() {
            const saved = localStorage.getItem("honey_clicker_save_v2");
            if (saved) {
                try { Object.assign(saveState, JSON.parse(saved)); } catch(e) { console.log("Сброс сейва."); }
            }
            
            const pot = document.getElementById("pot-clickable");
            if (pot) {
                pot.onclick = function() {
                    const currentTime = Date.now();
                    // Защита от бешеного автокликера, чтобы страница не зависала
                    if (currentTime - lastClickTime < 50) return;
                    lastClickTime = currentTime;

                    pot.style.transform = "scale(0.92)";
                    setTimeout(() => { pot.style.transform = "scale(1)"; }, 40);

                    saveState.honey += saveState.clickPower;
                    updateClickerUI();
                    saveClickerProgress();
                };
            }

            updateClickerUI();

            // Автодоход шмелей раз в секунду
            setInterval(() => {
                saveState.incomePerSecond = saveState.shmelCount * 1.5;
                saveState.honey += saveState.incomePerSecond;
                updateClickerUI();
                if (Math.random() < 0.2) saveClickerProgress();
            }, 1000);
        }

        function updateClickerUI() {
            if (!document.getElementById("ui-total-honey")) return;

            document.getElementById("ui-total-honey").innerText = saveState.honey.toFixed(1);
            document.getElementById("ui-income-rate").innerText = saveState.incomePerSecond.toFixed(1);
            document.getElementById("ui-click-power").innerText = saveState.clickPower;
            document.getElementById("ui-queen-lvl").innerText = saveState.queenLevel;
            
            document.getElementById("ui-shmel-counter").innerText = `Шмели-рабочие (x${saveState.shmelCount})`;
            document.getElementById("ui-shmel-price-tag").innerText = Math.floor(saveState.shmelPrice);
            document.getElementById("ui-queen-price-tag").innerText = Math.floor(saveState.queenPrice);
        }

        window.buyShmelWorker = function() {
            if (saveState.honey >= saveState.shmelPrice) {
                saveState.honey -= saveState.shmelPrice;
                saveState.shmelCount++;
                saveState.shmelPrice *= 1.35;
                
                window.showGameAlert("Нанят новый шмель-рабочий! 🐝", "✅");
                updateClickerUI();
                saveClickerProgress();
            } else {
                window.showGameAlert("Не хватает мёда на покупку шмеля!", "❌");
            }
        };

        window.upgradeQueenBee = function() {
            if (saveState.queenLevel >= 500) {
                window.showGameAlert("Королева раскачана до максимума!", "👑");
                return;
            }

            if (saveState.honey >= saveState.queenPrice) {
                saveState.honey -= saveState.queenPrice;
                saveState.queenLevel++;
                saveState.clickPower = 1 + (saveState.queenLevel - 1) * 2;
                saveState.queenPrice *= 1.45;
                
                window.showGameAlert(`Уровень Королевы повышен! Текущий уровень: ${saveState.queenLevel}/500`, "👑");
                updateClickerUI();
                saveClickerProgress();
            } else {
                window.showGameAlert("Не хватает мёда на улучшение Королевы!", "❌");
            }
        };

        window.resetEntireGameProgress = function() {
            const doubleCheck = confirm("🚨 ВНИМАНИЕ! Вы уверены, что хотите СБРОСИТЬ прогресс? Сейв будет стёрт под ноль!");
            if (doubleCheck) {
                localStorage.removeItem("honey_clicker_save_v2");
                alert("Весь мёд съеден, шмели улетели! 🔄");
                location.reload();
            }
        };

        function saveClickerProgress() {
            localStorage.setItem("honey_clicker_save_v2", JSON.stringify(saveState));
        }

        document.addEventListener("DOMContentLoaded", initBeeClicker);
    </script>
</body>
</html>
